name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-pack:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore tests\HealthIcons.Maui.Tests\HealthIcons.Maui.Tests.csproj

      - name: Build tests
        run: dotnet build tests\HealthIcons.Maui.Tests\HealthIcons.Maui.Tests.csproj -c Release --no-restore

      - name: Build package
        run: dotnet build src\HealthIcons.Maui\HealthIcons.Maui.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests\HealthIcons.Maui.Tests\HealthIcons.Maui.Tests.csproj -c Release --no-build

      - name: Pack preview package
        run: dotnet pack src\HealthIcons.Maui\HealthIcons.Maui.csproj -c Release --no-build -p:PackageVersion=0.0.0-ci.${{ github.run_number }} -o artifacts

      - name: Verify NuGet package exists
        shell: pwsh
        run: |
          $package = Get-ChildItem artifacts\*.nupkg | Where-Object { $_.Name -notlike '*.snupkg' } | Select-Object -First 1
          if ($null -eq $package) {
            throw 'Expected a .nupkg package to be generated.'
          }
          Write-Host "Generated package: $($package.FullName)"

      - uses: actions/upload-artifact@v4
        with:
          name: nuget-package-preview
          path: |
            artifacts\*.nupkg
            artifacts\*.snupkg
